<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon TCG Booster Pack Simulator</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    .bg-particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255, 203, 5, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(239, 68, 68, 0.06) 0%, transparent 40%);
    }
    .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      text-align: center; padding: 30px 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, #ffcb05, #ff6b35, #ffcb05);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    header p { color: #94a3b8; font-size: 0.9rem; margin-top: 4px; }

    .sets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }
    .pack-card {
      background: linear-gradient(145deg, #16213e, #0f3460);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .pack-card:hover {
      transform: translateY(-4px);
      border-color: #ffcb05;
      box-shadow: 0 12px 30px rgba(255, 203, 5, 0.15);
    }
    .pack-card .pack-img {
      width: 100px; height: 140px;
      margin: 0 auto 12px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1e293b, #334155);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      transition: transform 0.3s;
    }
    .pack-card:hover .pack-img { transform: scale(1.05); }
    .pack-card .pack-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
    .pack-card .pack-series { font-size: 0.75rem; color: #94a3b8; }
    .pack-card .pack-total { font-size: 0.75rem; color: #64748b; margin-top: 8px; }

    .pack-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .pack-overlay.active { display: flex; }

    .tear-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    .tear-pack {
      width: 180px; height: 252px;
      background: linear-gradient(145deg, #f59e0b, #d97706);
      border-radius: 12px;
      position: relative;
      animation: packShake 0.6s ease-in-out infinite alternate;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      box-shadow: 0 20px 60px rgba(245, 158, 11, 0.4);
      overflow: hidden;
    }
    .tear-pack::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
      animation: tearGlow 0.8s ease-in-out infinite;
    }
    @keyframes packShake {
      0% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(0deg) scale(1.02); }
      100% { transform: rotate(3deg) scale(1); }
    }
    @keyframes tearGlow {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .tear-text {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fbbf24;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .tear-flash {
      animation: flashOut 0.4s ease-out forwards;
    }
    @keyframes flashOut {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.5; filter: brightness(3); }
      100% { transform: scale(0); opacity: 0; }
    }

    .cards-reveal {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 900px;
    }
    .cards-reveal.active { display: flex; }

    .reveal-header {
      text-align: center; margin-bottom: 20px; width: 100%;
    }
    .reveal-header h2 {
      font-size: 1.3rem;
      color: #ffcb05;
    }
    .reveal-header .set-info { font-size: 0.85rem; color: #94a3b8; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      width: 100%;
      perspective: 1000px;
    }
    .card-item {
      aspect-ratio: 2.5/3.5;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: rotateY(180deg) scale(0.5);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
    }
    .card-item.revealed {
      opacity: 1;
      transform: rotateY(0deg) scale(1);
    }
    .card-item.revealed.rare-pulse {
      animation: rareGlow 1.5s ease-in-out 2;
    }
    @keyframes rareGlow {
      0%, 100% { box-shadow: 0 0 8px rgba(245, 158, 11, 0.3); }
      50% { box-shadow: 0 0 25px rgba(245, 158, 11, 0.8), 0 0 50px rgba(245, 158, 11, 0.3); }
    }
    .card-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-item .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 6px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card-item:hover .card-info { opacity: 1; }
    .card-item .rarity {
      position: absolute; top: 4px; right: 4px;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(0,0,0,0.7);
    }
    .rarity-Common { border: 2px solid #64748b; }
    .rarity-Uncommon { border: 2px solid #22c55e; }
    .rarity-Rare { border: 2px solid #3b82f6; }
    .rarity-Rare_Holo, .rarity-Rare_Holo_V,
    .rarity-Rare_Ultra, .rarity-Rare_Secret,
    .rarity-Rare_Shiny, .rarity-Rare_Shiny_GX,
    .rarity-Double_Rare, .rarity-Amazing_Rare,
    .rarity-Ultra_Rare, .rarity-illustration_rare,
    .rarity-special_illustration_rare { border: 2px solid #f59e0b; }

    .close-btn {
      margin-top: 24px;
      padding: 12px 32px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .close-btn:hover {
      background: rgba(255,203,5,0.15);
      border-color: #ffcb05;
      color: #ffcb05;
    }

    .loading {
      text-align: center; padding: 80px 20px; color: #94a3b8;
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ffcb05;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .loading-text { margin-top: 12px; font-size: 0.9rem; }
    .loading .loading-sub { margin-top: 4px; font-size: 0.8rem; color: #64748b; }

    .pack-overlay .loading-bar-wrap {
      width: 240px; height: 4px; background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden; margin-top: 8px;
    }
    .pack-overlay .loading-bar {
      height: 100%; width: 0; border-radius: 2px;
      background: linear-gradient(90deg, #ffcb05, #ff6b35);
      transition: width 0.3s ease;
    }

    /* Card detail modal - extended */
    .card-detail-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    .card-detail-overlay.active { display: flex; }
    .card-detail {
      max-width: 500px; width: 100%;
      text-align: center;
      max-height: 90vh;
      overflow-y: auto;
    }
    .card-detail .main-card-img {
      width: 100%; max-width: 280px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .card-detail h3 { font-size: 1.3rem; margin-bottom: 2px; }
    .card-detail .sub { color: #94a3b8; font-size: 0.8rem; margin-bottom: 8px; }
    .card-detail .price {
      padding: 6px 14px;
      background: rgba(255,203,5,0.1);
      border: 1px solid rgba(255,203,5,0.2);
      border-radius: 8px;
      display: inline-block;
      font-size: 0.85rem;
      color: #fbbf24;
      margin-bottom: 12px;
    }

    /* PokeAPI info section */
    .poke-section {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin-top: 12px;
      text-align: left;
    }
    .poke-section .poke-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .poke-section .poke-header .poke-sprite {
      width: 48px; height: 48px;
      image-rendering: pixelated;
    }
    .poke-section .poke-header .poke-name { font-weight: 700; font-size: 1rem; }
    .poke-section .poke-header .poke-id { color: #64748b; font-size: 0.8rem; }
    .poke-types { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .type-badge {
      padding: 2px 12px; border-radius: 20px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    }
    .type-Grass { background: #78c850; color: #000; }
    .type-Fire { background: #f08030; color: #fff; }
    .type-Water { background: #6890f0; color: #fff; }
    .type-Lightning { background: #f8d030; color: #000; }
    .type-Psychic { background: #f85888; color: #fff; }
    .type-Fighting { background: #c03028; color: #fff; }
    .type-Darkness { background: #705848; color: #fff; }
    .type-Metal { background: #b8b8d0; color: #000; }
    .type-Fairy { background: #ee99ac; color: #000; }
    .type-Dragon { background: #7038f8; color: #fff; }
    .type-Colorless { background: #a8a878; color: #000; }
    .type-Normal { background: #a8a878; color: #000; }
    .type-Ground { background: #e0c068; color: #000; }
    .type-Poison { background: #a040a0; color: #fff; }
    .type-Flying { background: #a890f0; color: #000; }
    .type-Bug { background: #a8b820; color: #000; }
    .type-Rock { background: #b8a038; color: #000; }
    .type-Ghost { background: #705898; color: #fff; }
    .type-Ice { background: #98d8d8; color: #000; }
    .type-Steel { background: #b8b8d0; color: #000; }
    .type-Electric { background: #f8d030; color: #000; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .stat-item { text-align: center; }
    .stat-item .stat-val {
      font-size: 1rem; font-weight: 700;
    }
    .stat-item .stat-label {
      font-size: 0.65rem; color: #64748b; text-transform: uppercase;
    }
    .evo-chain {
      display: flex; align-items: center; gap: 8px; margin-top: 10px;
      justify-content: center; flex-wrap: wrap;
    }
    .evo-link {
      font-size: 1.2rem; color: #64748b;
    }
    .evo-item {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
    }
    .evo-item img {
      width: 36px; height: 36px;
      image-rendering: pixelated;
    }
    .evo-item span { font-size: 0.7rem; color: #94a3b8; }

    .translate-btn {
      margin-top: 8px;
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .translate-btn:hover {
      border-color: #a78bfa;
      color: #a78bfa;
      background: rgba(167,139,250,0.1);
    }
    .translation-result {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #a78bfa;
      font-style: italic;
      min-height: 1.2em;
    }

    /* Joke toast */
    .joke-toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      z-index: 150;
      background: rgba(30, 41, 59, 0.95);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 24px;
      max-width: 400px;
      text-align: center;
      font-size: 0.85rem;
      color: #cbd5e1;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    .joke-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .section-title {
      font-size: 1.1rem; font-weight: 600; margin-bottom: 16px;
      color: #cbd5e1;
    }

    @media (max-width: 600px) {
      .sets-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .tear-pack { width: 140px; height: 196px; font-size: 2rem; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
      header h1 { font-size: 1.4rem; }
      .pack-card .pack-img { width: 80px; height: 112px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
<div class="bg-particles"></div>
<div class="container">
  <header>
    <h1>⚡ Booster Pack Simulator</h1>
    <p>Pilih pack, buka, dan kumpulkan kartu Pokémon-mu!</p>
  </header>
  <div id="app">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Memuat data set...</div>
      <div class="loading-sub" id="loadingSub">Mengambil data dari Pokémon TCG API</div>
    </div>
    <div id="sets-container" style="display:none">
      <div class="section-title">Pilih Booster Pack</div>
      <div class="sets-grid" id="sets-grid"></div>
    </div>
  </div>
</div>

<div class="pack-overlay" id="packOverlay">
  <div class="tear-container" id="tearContainer">
    <div class="tear-pack" id="tearPack">🎁</div>
    <div class="tear-text" id="tearText">Membuka pack...</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
  </div>
  <div class="cards-reveal" id="cardsReveal">
    <div class="reveal-header">
      <h2 id="revealSetName"></h2>
      <div class="set-info" id="revealSetInfo">Klik kartu untuk detail</div>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
    <button class="close-btn" onclick="closePack()">Tutup</button>
  </div>
</div>

<div class="card-detail-overlay" id="detailOverlay">
  <div class="card-detail">
    <img class="main-card-img" id="detailImg" src="" alt="">
    <h3 id="detailName"></h3>
    <div class="sub" id="detailSub"></div>
    <div class="price" id="detailPrice"></div>
    <div id="pokeInfo"></div>
    <button class="translate-btn" id="translateBtn" onclick="translateCard()">🌐 Terjemahkan ke Yoda</button>
    <div class="translation-result" id="translationResult"></div>
    <br>
    <button class="close-btn" onclick="document.getElementById('detailOverlay').classList.remove('active')" style="margin-top:8px">Tutup</button>
  </div>
</div>

<div class="joke-toast" id="jokeToast"></div>

<script>
// ---- Config ----
const API = 'https://api.pokemontcg.io/v2';
const POKE_API = 'https://pokeapi.co/api/v2';
const FUNTRANS_API = 'https://api.funtranslations.com/translate';
const JOKE_API = 'https://v2.jokeapi.dev/joke/Any?type=single&safe-mode';
const TIMEOUT = 30000;

let allSets = [];
let openedCards = [];
let audioCtx = null;
let currentPokeName = '';

// ---- Helpers ----
function fetchJSON(url, timeout = TIMEOUT) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeout);
  return fetch(url, { signal: ctrl.signal })
    .then(r => { clearTimeout(timer); if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
    .catch(e => { clearTimeout(timer); throw e; });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- Audio ----
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTearSound() {
  try {
    initAudio();
    const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.max(0, 1 - i / d.length * 4);
    }
    const s = audioCtx.createBufferSource();
    s.buffer = b;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.3, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    s.connect(g).connect(audioCtx.destination);
    s.start();
  } catch (_) {}
}

function playRareSound() {
  try {
    initAudio();
    const notes = [523.25, 659.25, 783.99, 1046.5];
    notes.forEach((freq, i) => {
      const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
      const d = b.getChannelData(0);
      for (let j = 0; j < d.length; j++) {
        d[j] = Math.sin(2 * Math.PI * freq * j / audioCtx.sampleRate) * Math.max(0, 1 - j / d.length);
      }
      const s = audioCtx.createBufferSource();
      s.buffer = b;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.2, audioCtx.currentTime + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.15);
      s.connect(g).connect(audioCtx.destination);
      s.start(audioCtx.currentTime + i * 0.08);
    });
  } catch (_) {}
}

// ---- Confetti ----
function fireConfetti() {
  try {
    confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 }, colors: ['#ffcb05', '#ff6b35', '#3b82f6', '#22c55e'] });
    setTimeout(() => confetti({ particleCount: 40, spread: 50, origin: { y: 0.5 }, colors: ['#ffcb05', '#ef4444'] }), 200);
  } catch (_) {}
}

// ---- Joke ----
async function showJoke() {
  try {
    const data = await fetchJSON(JOKE_API, 5000);
    const joke = data.joke || '';
    const toast = document.getElementById('jokeToast');
    toast.textContent = '😂 ' + joke;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 5000);
  } catch (_) {}
}

// ---- Init ----
async function init() {
  const loading = document.getElementById('loading');
  const loadSub = document.getElementById('loadingSub');
  try {
    loadSub.textContent = 'Menghubungi Pokémon TCG API...';
    const data = await fetchJSON(API + '/sets?orderBy=-releaseDate&pageSize=40');
    allSets = data.data;
    renderSets(allSets);
    loading.style.display = 'none';
    document.getElementById('sets-container').style.display = 'block';
  } catch (err) {
    if (err.name === 'AbortError') {
      loading.innerHTML = `
        <p style="color:#ef4444;font-size:1.1rem">⏱️ Koneksi timeout</p>
        <p style="color:#94a3b8;font-size:0.85rem;margin-top:8px">Server Pokémon TCG API terlalu lambat</p>
        <button onclick="init()" style="margin-top:16px;padding:10px 28px;border:2px solid #ffcb05;border-radius:10px;background:transparent;color:#ffcb05;font-weight:600;cursor:pointer">Coba Lagi</button>
      `;
    } else {
      loading.innerHTML = `
        <p style="color:#ef4444">❌ Gagal: ${err.message}</p>
        <button onclick="init()" style="margin-top:12px;padding:8px 24px;border:1px solid #ef4444;border-radius:8px;background:transparent;color:#ef4444;cursor:pointer">Coba Lagi</button>
      `;
    }
  }
}

function renderSets(sets) {
  const grid = document.getElementById('sets-grid');
  const seriesColors = {
    'Mega Evolution': 'linear-gradient(135deg, #7c3aed, #2563eb)',
    'Sun & Moon': 'linear-gradient(135deg, #f59e0b, #ea580c)',
    'Sword & Shield': 'linear-gradient(135deg, #3b82f6, #06b6d4)',
    'Scarlet & Violet': 'linear-gradient(135deg, #ef4444, #ec4899)',
    'Black & White': 'linear-gradient(135deg, #374151, #6b7280)',
    'XY': 'linear-gradient(135deg, #8b5cf6, #a855f7)',
    'HeartGold & SoulSilver': 'linear-gradient(135deg, #fbbf24, #b45309)',
    'Diamond & Pearl': 'linear-gradient(135deg, #6366f1, #818cf8)',
  };
  grid.innerHTML = sets.map(set => {
    const logo = set.images?.logo || '';
    const bg = seriesColors[set.series] || 'linear-gradient(135deg, #1e293b, #475569)';
    return `
      <div class="pack-card" onclick="openPack('${set.id}')">
        <div class="pack-img" style="background:${bg}">
          ${logo ? `<img src="${logo}" alt="${set.name}" style="width:80%;height:auto;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))">` : '📦'}
        </div>
        <div class="pack-name">${set.name}</div>
        <div class="pack-series">${set.series}</div>
        <div class="pack-total">${set.printedTotal} kartu</div>
      </div>
    `;
  }).join('');
}

// ---- Pack opening ----
async function openPack(setId) {
  const overlay = document.getElementById('packOverlay');
  const tearContainer = document.getElementById('tearContainer');
  const cardsReveal = document.getElementById('cardsReveal');
  const tearPack = document.getElementById('tearPack');
  const tearText = document.getElementById('tearText');
  const loadingBar = document.getElementById('loadingBar');

  overlay.classList.add('active');
  tearContainer.style.display = 'flex';
  cardsReveal.classList.remove('active');
  tearPack.className = 'tear-pack';
  tearPack.textContent = '🎁';
  tearText.textContent = 'Mengambil data kartu...';
  loadingBar.style.width = '0%';
  loadingBar.style.display = '';

  const set = allSets.find(s => s.id === setId);
  if (!set) return;

  let progress = 0;
  const prog = setInterval(() => {
    progress = Math.min(progress + 3, 85);
    loadingBar.style.width = progress + '%';
  }, 600);

  try {
    const allCards = await fetchJSON(API + `/cards?q=set.id:${setId}&pageSize=250`);
    const allCardData = allCards.data || [];

    clearInterval(prog);
    loadingBar.style.width = '100%';

    const shuffled = allCardData.sort(() => Math.random() - 0.5);
    openedCards = shuffled.slice(0, 10);

    playTearSound();
    await delay(300);
    tearPack.classList.add('tear-flash');
    tearText.textContent = '✨ Kartu-kartu muncul!';
    loadingBar.style.display = 'none';

    const rareCards = openedCards.filter(c => {
      const r = c.rarity || '';
      return r.includes('Rare') || r.includes('Ultra') || r.includes('Secret') || r.includes('Shiny');
    });

    if (rareCards.length > 0) {
      setTimeout(() => { playRareSound(); fireConfetti(); }, 800);
    }

    await delay(600);
    tearContainer.style.display = 'none';
    cardsReveal.classList.add('active');

    const grid = document.getElementById('cardsGrid');
    document.getElementById('revealSetName').textContent = `✨ ${set.name}`;
    document.getElementById('revealSetInfo').textContent = `${set.series} — ${openedCards.length} kartu`;

    grid.innerHTML = openedCards.map((card, i) => {
      const rarity = (card.rarity || 'Common').replace(/\s+/g, '_');
      const isRare = rarity.includes('Rare') || rarity.includes('Ultra') || rarity.includes('Secret') || rarity.includes('Shiny');
      return `
        <div class="card-item rarity-${rarity} ${isRare ? 'rare-pulse' : ''}" style="transition-delay:${i * 0.08}s" data-index="${i}" onclick="showDetail(${i})">
          <img src="${card.images?.small || ''}" alt="${card.name}" loading="lazy">
          <div class="rarity">${card.rarity || 'Common'}</div>
          <div class="card-info">${card.name}${isRare ? ' ⭐' : ''}</div>
        </div>
      `;
    }).join('');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.card-item').forEach(el => el.classList.add('revealed'));
      });
    });

    // Show joke for common cards
    const allCommon = openedCards.every(c => {
      const r = c.rarity || '';
      return !r.includes('Rare') && !r.includes('Ultra') && !r.includes('Secret') && !r.includes('Shiny');
    });
    if (allCommon) showJoke();

  } catch (err) {
    clearInterval(prog);
    tearText.textContent = err.name === 'AbortError' ? '⏱️ Timeout — server terlalu lambat' : '❌ Gagal: ' + err.message;
    await delay(1500);
    closePack();
  }
}

// ---- PokeAPI Integration ----
async function showDetail(index) {
  const card = openedCards[index];
  if (!card) return;
  const overlay = document.getElementById('detailOverlay');

  document.getElementById('detailImg').src = card.images?.large || card.images?.small || '';
  document.getElementById('detailName').textContent = `${card.name} — ${card.supertype || ''}`;
  const types = (card.types || []).join(', ');
  document.getElementById('detailSub').textContent = [card.rarity, card.hp ? `HP ${card.hp}` : '', types].filter(Boolean).join(' | ');

  const priceEl = document.getElementById('detailPrice');
  const prices = card.tcgplayer?.prices;
  if (prices) {
    const keys = Object.keys(prices);
    priceEl.textContent = keys.length ? `💰 Market: $${(prices[keys[0]].market || 0).toFixed(2)}` : '';
  } else priceEl.textContent = '';

  document.getElementById('translationResult').textContent = '';
  document.getElementById('pokeInfo').innerHTML = '<div class="loading-text" style="font-size:0.8rem">Memuat data Pokémon...</div>';

  currentPokeName = card.name.toLowerCase().replace(/[^a-z0-9]/g, '').replace(/\s+/g, '-');
  if (currentPokeName.startsWith('mega')) currentPokeName = currentPokeName.replace('mega', '');
  if (currentPokeName.endsWith('ex')) currentPokeName = currentPokeName.slice(0, -2).trim();

  const knownFix = {
    'vileplume': 'vileplume', 'heracross': 'heracross', 'pikachu': 'pikachu',
    'charizard': 'charizard', 'blastoise': 'blastoise', 'venusaur': 'venusaur',
    'mewtwo': 'mewtwo', 'mew': 'mew', 'gyarados': 'gyarados',
    'eevee': 'eevee', 'snorlax': 'snorlax', 'dragonite': 'dragonite',
    'gengar': 'gengar', 'arcanine': 'arcanine', 'alakazam': 'alakazam',
    'machamp': 'machamp', 'golem': 'golem', 'kangaskhan': 'kangaskhan',
    'scyther': 'scyther', 'pinsir': 'pinsir', 'tauros': 'tauros',
    'ditto': 'ditto', 'omanyte': 'omanyte', 'omastar': 'omastar',
    'kabuto': 'kabuto', 'kabutops': 'kabutops', 'aerodactyl': 'aerodactyl',
    'articuno': 'articuno', 'zapdos': 'zapdos', 'mol tres': 'moltres',
    'moltres': 'moltres', 'dratini': 'dratini', 'oddish': 'oddish',
    'gloom': 'gloom', 'lotad': 'lotad', 'lombre': 'lombre',
    'ludicolo': 'ludicolo', 'ralts': 'ralts', 'kirlia': 'kirlia',
    'gardevoir': 'gardevoir', 'bagon': 'bagon', 'shelgon': 'shelgon',
    'salamence': 'salamence', 'beldum': 'beldum', 'metang': 'metang',
    'metagross': 'metagross', 'gible': 'gible', 'gabite': 'gabite',
    'garchomp': 'garchomp', 'riolu': 'riolu', 'lucario': 'lucario',
    'honedge': 'honedge', 'doublade': 'doublade', 'aegislash': 'aegislash',
    'absol': 'absol', 'sneasel': 'sneasel', 'weavile': 'weavile',
    'umbreon': 'umbreon', 'espeon': 'espeon', 'leafeon': 'leafeon',
    'glaceon': 'glaceon', 'sylveon': 'sylveon', 'jolteon': 'jolteon',
    'flareon': 'flareon', 'vaporeon': 'vaporeon',
  };

  let pokeName = knownFix[currentPokeName] || currentPokeName;

  try {
    const pokeData = await fetchJSON(`${POKE_API}/pokemon/${pokeName}`, 8000);
    const speciesData = await fetchJSON(`${POKE_API}/pokemon-species/${pokeData.id}`, 8000);

    const typesHtml = pokeData.types.map(t =>
      `<span class="type-badge type-${t.type.name.charAt(0).toUpperCase() + t.type.name.slice(1)}">${t.type.name}</span>`
    ).join('');

    const stats = {};
    pokeData.stats.forEach(s => stats[s.stat.name] = s.base_stat);

    const totalStats = pokeData.stats.reduce((a, s) => a + s.base_stat, 0);

    const sprite = pokeData.sprites?.other?.['official-artwork']?.front_default ||
                   pokeData.sprites?.front_default || '';

    let evoHtml = '';
    try {
      const evoUrl = speciesData.evolution_chain?.url;
      if (evoUrl) {
        const evoData = await fetchJSON(evoUrl, 5000);
        const evoList = [];
        let chain = evoData.chain;
        while (chain) {
          evoList.push(chain.species.name);
          chain = chain.evolves_to?.[0] || null;
        }
        evoHtml = `<div class="evo-chain">${await Promise.all(evoList.map(async (name, i) => {
          const id = await getPokemonId(name);
          const img = id ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png` : '';
          return (i > 0 ? '<span class="evo-link">→</span>' : '') +
            `<div class="evo-item"><img src="${img}" alt="${name}" onerror="this.style.display='none'"><span>${name.charAt(0).toUpperCase()+name.slice(1)}</span></div>`;
        })).then(r => r.join(''))}</div>`;
      }
    } catch (_) {}

    document.getElementById('pokeInfo').innerHTML = `
      <div class="poke-section">
        <div class="poke-header">
          ${sprite ? `<img class="poke-sprite" src="${sprite}" alt="">` : ''}
          <div>
            <div class="poke-name">${speciesData.name.charAt(0).toUpperCase() + speciesData.name.slice(1)}</div>
            <div class="poke-id">#${String(pokeData.id).padStart(4, '0')}</div>
          </div>
        </div>
        <div class="poke-types">${typesHtml}</div>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-val">${stats.hp||0}</div><div class="stat-label">HP</div></div>
          <div class="stat-item"><div class="stat-val">${stats.attack||0}</div><div class="stat-label">ATK</div></div>
          <div class="stat-item"><div class="stat-val">${stats.defense||0}</div><div class="stat-label">DEF</div></div>
          <div class="stat-item"><div class="stat-val">${stats['special-attack']||0}</div><div class="stat-label">SPATK</div></div>
          <div class="stat-item"><div class="stat-val">${stats['special-defense']||0}</div><div class="stat-label">SPDEF</div></div>
        </div>
        <div style="text-align:center;margin-top:6px;font-size:0.8rem;color:#64748b">Total Base Stats: ${totalStats}</div>
        ${evoHtml}
      </div>
    `;
  } catch (_) {
    document.getElementById('pokeInfo').innerHTML = '';
  }

  overlay.classList.add('active');
}

const pokeIdCache = {};
async function getPokemonId(name) {
  if (pokeIdCache[name]) return pokeIdCache[name];
  try {
    const d = await fetchJSON(`${POKE_API}/pokemon/${name}`, 3000);
    pokeIdCache[name] = d.id;
    return d.id;
  } catch { return null; }
}

// ---- FunTranslations ----
async function translateCard() {
  const name = document.getElementById('detailName')?.textContent?.split('—')[0]?.trim();
  if (!name) return;
  const resultEl = document.getElementById('translationResult');
  resultEl.textContent = 'Menerjemahkan...';
  try {
    const data = await fetchJSON(`${FUNTRANS_API}/yoda.json`, 6000, { method: 'POST', body: new URLSearchParams({ text: name }), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
    resultEl.textContent = '"' + (data.contents?.translated || name) + '"';
  } catch {
    resultEl.textContent = '✨ ' + name.split('').reverse().join('') + ' ✨';
  }
}

function closePack() {
  document.getElementById('packOverlay').classList.remove('active');
  document.getElementById('tearContainer').style.display = 'flex';
  document.getElementById('cardsReveal').classList.remove('active');
}

init();
</script>
